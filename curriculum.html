<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum</title>
    <style>
        /* Add styles for the grid layout */
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .badge {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .badge img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Curriculum</h1>
    <section>
        <h2>Open Badge</h2>
        <div class="badge-grid">
            <div class="badge">
                <img src="URL_TO_BADGE_1_IMAGE" alt="Adottare l'intelligenza artificiale nella PA">
                <h3>Adottare l'intelligenza artificiale nella PA</h3>
                <a href="https://openbadges.bestr.it/public/assertions/8YAG9HkiS-64Xd5BoM89ww">Vai</a>
            </div>
            <div class="badge">
                <img src="URL_TO_BADGE_2_IMAGE" alt="Gestire dati informazioni e contenuti digitali">
                <h3>Gestire dati informazioni e contenuti digitali</h3>
                <a href="https://openbadges.bestr.it/public/assertions/Ykb3f7J1R3CTu36yxXTkRQ">Vai</a>
            </div>
            <div class="badge">
                <img src="URL_TO_BADGE_3_IMAGE" alt="Produrre valutare e gestire documenti informatici">
                <h3>Produrre valutare e gestire documenti informatici</h3>
                <a href="https://openbadges.bestr.it/public/assertions/ERePz-iCT_CCDVINT6z01g">Vai</a>
            </div>
        </div>
    </section>
</body>
</html>
